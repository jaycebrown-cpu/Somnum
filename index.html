<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Somnum Engine</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030303;
            color: #ffffff;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            display: grid;
            grid-template-rows: 60px 50px 1fr 180px;
            align-items: center;
            justify-items: center;
            padding: 20px;
            position: relative;
            z-index: 5;
        }

        .frame-corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
            pointer-events: none;
        }
        .top-left { top: 15px; left: 15px; border-right: none; border-bottom: none; }
        .top-right { top: 15px; right: 15px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 15px; left: 15px; border-right: none; border-top: none; }
        .bottom-right { bottom: 15px; right: 15px; border-left: none; border-top: none; }

        .app-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .exercise-selector-container {
            display: flex;
            gap: 10px;
            z-index: 30;
        }
        .exercise-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            font-family: inherit;
            font-size: 0.75rem;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .exercise-btn.active {
            background: #ffffff;
            color: #030303;
            border-color: #ffffff;
        }

        .visualizer-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
        }
        
        .circadian-phase {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        #current-state {
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        #timer-display {
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 1px;
        }
        .swipe-indicator {
            font-size: 0.55rem;
            opacity: 0.3;
            margin-top: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .controls-wrapper {
            width: 100%;
            max-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            z-index: 30;
        }
        .slider-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .slider-label { font-size: 0.65rem; opacity: 0.5; text-transform: uppercase; }
        .slider {
            flex-grow: 1;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            height: 2px;
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        .timer-select-container { display: flex; gap: 8px; }
        .timer-opt-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-family: inherit;
            font-size: 0.65rem;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .timer-opt-btn.active { border-color: #ffffff; background: rgba(255,255,255,0.1); }

        .control-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: transparent;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 8px 0 8px 14px;
            border-color: transparent transparent transparent #ffffff;
            transform: translateX(2px);
        }
        .control-btn.playing .btn-icon {
            border-style: double;
            border-width: 0px 0px 0px 14px;
            border-color: transparent transparent transparent #ffffff;
            transform: translateX(0px);
        }
    </style>
</head>
<body>
    <div class="frame-corner top-left"></div>
    <div class="frame-corner top-right"></div>
    <div class="frame-corner bottom-left"></div>
    <div class="frame-corner bottom-right"></div>

    <main class="app-container" id="gesture-zone">
        <header class="app-header">
            <span>● System Active</span>
            <span id="frequency-readout">000.00 Hz</span>
        </header>

        <div class="exercise-selector-container">
            <button class="exercise-btn" data-type="breathe">Breathwork</button>
            <button class="exercise-btn" data-type="meditate">Meditation</button>
            <button class="exercise-btn" data-type="attention">Attention</button>
        </div>

        <div class="visualizer-wrapper">
            <canvas id="sound-visualizer"></canvas>
            <div class="circadian-phase">
                <span id="current-state">Focus</span>
                <span id="timer-display">00:00:00</span>
                <div class="swipe-indicator">‹ swipe anywhere to shift ›</div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="slider-container">
                <span class="slider-label">Vol</span>
                <input type="range" id="intensity-slider" class="slider" min="0" max="100" value="50">
            </div>

            <div class="timer-select-container">
                <button class="timer-opt-btn" data-minutes="1">1M</button>
                <button class="timer-opt-btn" data-minutes="15">15M</button>
                <button class="timer-opt-btn" data-minutes="30">30M</button>
                <button class="timer-opt-btn" id="cancel-timer-btn" style="display: none;">✕</button>
            </div>

            <button id="play-pause-btn" class="control-btn">
                <div class="btn-icon"></div>
            </button>
        </div>
    </main>

    <audio id="silent-bg-anchor" loop muted playsinline src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="></audio>

    <script>
    const appState = {
        audioContext: null,
        brownNoiseNode: null,
        filterNode: null,
        analyserNode: null,
        gainNode: null,
        isPlaying: false,
        currentPhase: 'Focus',
        manualPhaseIndex: 2,
        sleepTimerId: null,
        sleepTimeRemaining: 0,
        activeExercise: null, 
        renderTime: 0
    };

    const CIRCADIAN_PHASES = [
        { name: 'Sleep', bgColor: '#020204', color: '#5b83b3', frequency: 120 },
        { name: 'Wake Up', bgColor: '#060604', color: '#dfb15b', frequency: 280 },
        { name: 'Focus', bgColor: '#030303', color: '#ffffff', frequency: 500 },
        { name: 'Relax', bgColor: '#050406', color: '#d9815b', frequency: 220 }
    ];

    const canvas = document.getElementById('sound-visualizer');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = 260 * window.devicePixelRatio;
        canvas.height = 260 * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    resizeCanvas();

    function renderLoop() {
        ctx.clearRect(0, 0, 260, 260);
        const cx = 130;
        const cy = 130;
        appState.renderTime += 0.02;

        let dataArray = new Uint8Array(32);
        // Safely check if analyser exists so it never throws an unhandled error on page load
        if (appState.isPlaying && appState.analyserNode) {
            appState.analyserNode.getByteFrequencyData(dataArray);
        }

        let currentTargetPhase = CIRCADIAN_PHASES[appState.manualPhaseIndex];

        if (appState.activeExercise === 'meditate') {
            ctx.beginPath();
            ctx.strokeStyle = '#ff7a00'; 
            ctx.lineWidth = 2.5;
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(255, 122, 0, 0.5)';

            for (let i = 0; i <= 64; i++) {
                const angle = (i / 64) * Math.PI * 2;
                const audioMod = dataArray[i % 32] ? (dataArray[i % 32] / 255) * 15 : 0;
