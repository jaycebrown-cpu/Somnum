<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Endel Engine Portal</title>
    <!-- PWA Manifest & iOS Standalone Theme Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        /* --- 1. PREMIUM MONOCHROME MATRIX SYSTEM --- */
        :root {
            --bg-color: #030303;
            --accent-color: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.02);
            --border-color: rgba(255, 255, 255, 0.05);
            --font-mono: "Courier New", Courier, monospace;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: var(--font-mono);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            letter-spacing: 0.15em;
            transition: background-color 4.0s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Sci-fi Crosshair Matrix Overlay Grid */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at center, transparent 30%, var(--bg-color) 80%),
                linear-gradient(rgba(255, 255, 255, 0.003) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.003) 1px, transparent 1px);
            background-size: 100%, 30px 30px;
            z-index: 0;
            pointer-events: none;
        }

        /* Vector Corner Framing Elements */
        .frame-corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 1px solid var(--border-color);
            z-index: 5;
            pointer-events: none;
        }
        .top-left { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .top-right { top: 30px; right: 30px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 30px; left: 30px; border-right: none; border-top: none; }
        .bottom-right { bottom: 30px; right: 30px; border-left: none; border-top: none; }

        /* Mobile Click Optimization Target Zone */
        #gesture-zone {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            height: 85vh;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: auto !important; /* Fixed iOS tap blocking */
        }

        .app-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        /* Exercise Deck Controls */
        .exercise-selector-container {
            display: flex;
            gap: 8px;
            width: 100%;
            justify-content: center;
            margin-top: 15px;
            position: relative;
            z-index: 10 !important;
            pointer-events: auto !important;
        }

        .exercise-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: rgba(255, 255, 255, 0.4);
            font-family: var(--font-mono);
            font-size: 8px;
            padding: 6px 12px;
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            position: relative;
            z-index: 20 !important;
            pointer-events: auto !important;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .exercise-btn:hover, .exercise-btn.exercise-active {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* Visualization Core Mechanics */
        .visualizer-wrapper {
            position: relative;
            width: 380px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Let taps fall straight through background canvas lines */
        }

        #sound-visualizer {
            position: absolute;
            width: 100%;
            height: 100%;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 1;
        }

        .geo-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px dashed var(--border-color);
            pointer-events: none;
            z-index: 1;
        }
        .outer-ring { width: 360px; height: 360px; animation: rotateClockwise 40s linear infinite; }
        .mid-ring { width: 280px; height: 280px; border-style: dotted; animation: rotateCounterClockwise 25s linear infinite; }

        @keyframes rotateClockwise { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotateCounterClockwise { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* Target Center Frame */
        .circadian-phase {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(3, 3, 3, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 3;
            pointer-events: none;
        }

        #current-state {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
            transition: color 2s ease, text-shadow 2s ease;
        }

        #timer-display {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 8px;
        }

        .swipe-indicator {
            font-size: 7px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 10px;
            letter-spacing: 0.05em;
            animation: pulseHint 2.5s ease-in-out infinite;
        }

        @keyframes pulseHint { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

        /* Controls Architecture */
        .controls-wrapper, .timer-select-container, .pomo-container {
            position: relative;
            z-index: 10 !important;
            pointer-events: auto !important;
        }

        .controls-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .slider-container {
            width: 80%;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 10;
        }
        .slider-label { font-size: 8px; color: rgba(255, 255, 255, 0.3); pointer-events: none; }

        .slider {
            -webkit-appearance: none;
            appearance: none;
            flex-grow: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            position: relative;
            z-index: 20 !important;
            pointer-events: auto !important;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 8px #ffffff;
        }

        /* Pomodoro Styling */
        .pomo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: -5px;
            animation: fadeInUI 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes fadeInUI { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .pomo-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-family: var(--font-mono);
            font-size: 9px;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            position: relative;
            z-index: 20 !important;
            pointer-events: auto !important;
            transition: all 0.3s ease;
        }
        .pomo-btn:hover, .pomo-btn.pomo-active {
            border-color: #ff6464;
            color: #ff6464;
            box-shadow: 0 0 10px rgba(255, 100, 100, 0.1);
        }
        .pomo-status { font-size: 7px; color: rgba(255, 255, 255, 0.3); letter-spacing: 0.08em; text-transform: uppercase; pointer-events: none; }

        /* Sleep Timer Buttons */
        .timer-select-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-bottom: -10px;
        }

        .timer-opt-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
