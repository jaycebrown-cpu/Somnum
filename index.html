<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Somnum Engine</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #030303;
            --accent-color: #ffffff;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030303;
            color: #ffffff;
            font-family: var(--font-mono);
            transition: background-color 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .frame-corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 15;
            pointer-events: none;
        }
        .top-left { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .top-right { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            position: relative;
            z-index: 2;
        }

        .app-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            position: relative;
            z-index: 10;
        }
        .system-status { display: flex; align-items: center; gap: 6px; }

        .exercise-selector-container {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            position: relative;
            z-index: 10;
        }
        .exercise-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .exercise-btn.active {
            background: #ffffff;
            color: #030303;
            border-color: #ffffff;
        }

        .visualizer-wrapper {
            position: relative;
            width: 65vmin;
            height: 65vmin;
            max-width: 260px;
            max-height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            margin: 10px 0;
        }
        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 3;
            pointer-events: none;
        }
        .geo-ring {
            position: absolute;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            pointer-events: none;
        }
        .outer-ring { width: 100%; height: 100%; animation: spin 120s linear infinite; }
        .mid-ring { width: 75%; height: 75%; animation: spin 60s linear infinite reverse; }

        .circadian-phase {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 4;
            pointer-events: none;
        }
        #current-state {
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        #timer-display {
            font-size: 0.75rem;
            opacity: 0.5;
            letter-spacing: 1px;
        }
        .swipe-indicator {
            font-size: 0.55rem;
            opacity: 0.25;
            margin-top: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .controls-wrapper {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        .slider-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .slider-label { font-size: 0.65rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
        .slider {
            flex-grow: 1;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 2px;
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        .timer-select-container { display: flex; gap: 10px; }
        .timer-opt-btn, .pomo-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .timer-opt-btn.active { border-color: #ffffff; background: rgba(255,255,255,0.05); }

        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }
        .control-btn:hover { border-color: #ffffff; }
        .btn-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 8px 0 8px 14px;
            border-color: transparent transparent transparent #ffffff;
            transform: translateX(2px);
            transition: all 0.2s ease;
        }
        .control-btn.playing .btn-icon {
            border-style: double;
            border-width: 0px 0px 0px 14px;
            border-color: transparent transparent transparent #ffffff;
            transform: translateX(0px);
        }

        .pomo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
        }
        .pomo-status { font-size: 0.6rem; opacity: 0.4; text-transform: uppercase; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="frame-corner top-left"></div>
    <div class="frame-corner top-right"></div>
    <div class="frame-corner bottom-left"></div>
    <div class="frame-corner bottom-right"></div>

    <main class="app-container" id="gesture-zone">
        <header class="app-header">
            <span class="system-status">● Core Engine Active</span>
            <span id="frequency-readout">000.00 Hz</span>
        </header>

        <div class="exercise-selector-container">
            <button class="exercise-btn" data-type="breathe">Breathwork</button>
            <button class="exercise-btn" data-type="meditate">Meditation</button>
            <button class="exercise-btn" data-type="attention">Attention</button>
        </div>

        <div class="visualizer-wrapper">
            <div class="geo-ring outer-ring"></div>
            <div class="geo-ring mid-ring"></div>
            <canvas id="sound-visualizer"></canvas>
            
            <div class="circadian-phase">
                <span id="current-state">Focus</span>
                <span id="timer-display">00:00:00</span>
                <div class="swipe-indicator">‹ swipe to shift ›</div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="slider-container">
                <span class="slider-label">Intens</span>
                <input type="range" id="intensity-slider" class="slider" min="0" max="100" value="50">
            </div>

            <div id="pomo-module-container" class="pomo-container" style="display: none;">
                <button id="pomo-toggle-btn" class="pomo-btn">Start Focus Cycle</button>
                <div id="pomo-status-text" class="pomo-status">Session 1/4</div>
            </div>

            <div class="timer-select-container">
                <button class="timer-opt-btn" data-minutes="1">1M</button>
                <button class="timer-opt-btn" data-minutes="15">15M</button>
                <button class="timer-opt-btn" data-minutes="30">30M</button>
                <button class="timer-opt-btn" id="cancel-timer-btn" style="display: none;">✕</button>
            </div>

            <button id="play-pause-btn" class="control-btn">
                <span class="btn-icon"></span>
            </button>
        </div>
    </main>
